<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CTLP 邮件</title>
    <style>
        body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; font-size: 15px; line-height: 1.6; color: #333; background: #f5f5f5; }
        .wrap { max-width: 520px; margin: 0 auto; padding: 32px 20px; }
        .card { background: #fff; border-radius: 12px; padding: 32px 28px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
        .title { font-size: 18px; font-weight: 600; color: #1a1a1a; margin: 0 0 20px 0; }
        .text { margin: 0 0 20px 0; color: #555; }
        .code-box { background: #f8f9fa; border: 1px solid #e9ecef; border-radius: 8px; padding: 16px 24px; margin: 20px 0; font-size: 24px; font-weight: 600; letter-spacing: 6px; text-align: center; color: #1a1a1a; }
        .btn { display: inline-block; padding: 12px 28px; background: #2563eb; color: #fff !important; text-decoration: none; border-radius: 8px; font-weight: 500; margin: 16px 0; }
        .hint { font-size: 13px; color: #888; margin-top: 24px; }
        .brand { font-size: 12px; color: #999; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="card">
            {{content}}
        </div>
    </div>
</body>
</html>
